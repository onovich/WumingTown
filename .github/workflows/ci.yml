name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main
      - "task/**"

jobs:
  ci-local:
    name: Local CI parity
    runs-on: windows-latest
    env:
      WM_ARTIFACT_DIR: coordination/artifacts/WM-0010/ci-local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Record environment
        run: node tools/write-environment-report.mjs

      - name: Run local CI parity gate
        run: pnpm ci:local

      - name: Upload CI parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wm-0010-ci-local
          path: coordination/artifacts/WM-0010/ci-local

  benchmarks:
    name: Benchmarks
    runs-on: windows-latest
    env:
      WM_ARTIFACT_DIR: coordination/artifacts/WM-0010/benchmarks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Record environment
        run: node tools/write-environment-report.mjs

      - name: Run benchmark baseline comparison
        run: pnpm bench

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wm-0010-benchmarks
          path: coordination/artifacts/WM-0010/benchmarks

  audit-deps:
    name: Dependency audit
    runs-on: windows-latest
    env:
      WM_ARTIFACT_DIR: coordination/artifacts/WM-0010/audit-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Record environment
        run: node tools/write-environment-report.mjs

      - name: Run dependency audit
        run: pnpm audit:deps

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wm-0010-audit
          path: coordination/artifacts/WM-0010/audit-deps
